<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="goBlueFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <linearGradient id="purpleAccentFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#0F172A"/>
  
  <!-- Geometric logo -->
  <g transform="translate(16, 16)">
    <!-- Outer hexagon -->
    <polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="none" stroke="url(#goBlueFav)" stroke-width="1.5"/>
    
    <!-- Inner hexagon -->
    <polygon points="0,-8 7,-4 7,4 0,8 -7,4 -7,-4" fill="url(#goBlueFav)" opacity="0.2"/>
    
    <!-- Code bracket left -->
    <path d="M-4 -4 L-7 0 L-4 4" stroke="url(#purpleAccentFav)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Code bracket right -->
    <path d="M4 -4 L7 0 L4 4" stroke="url(#purpleAccentFav)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="url(#goBlueFav)"/>
  </g>
</svg>