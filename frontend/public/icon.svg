<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Go Blue Gradient -->
    <linearGradient id="goBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <!-- Purple accent -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#0F172A"/>
  
  <!-- Geometric logo container -->
  <g transform="translate(32, 32)">
    <!-- Outer hexagon -->
    <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11" fill="none" stroke="url(#goBlueGrad)" stroke-width="2"/>
    
    <!-- Inner hexagon -->
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="url(#goBlueGrad)" opacity="0.2"/>
    
    <!-- Code bracket left < -->
    <path d="M-8 -6 L-13 0 L-8 6" stroke="url(#purpleGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Code bracket right > -->
    <path d="M8 -6 L13 0 L8 6" stroke="url(#purpleGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot representing Go -->
    <circle cx="0" cy="0" r="5" fill="url(#goBlueGrad)"/>
    
    <!-- Small accent dots -->
    <circle cx="0" cy="-20" r="2" fill="#00ADD8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>