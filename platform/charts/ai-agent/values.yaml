# Default values for ai-agent
replicaCount: 2

image:
  repository: ghcr.io/your-org/ai-agent-platform
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agent.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# AI Agent specific config
agent:
  type: "react"  # react, base, custom
  llmProvider: "openai"
  llmModel: "gpt-4"
  maxTokens: 4096
  temperature: 0.7

  # Tool registry
  tools:
    enabled: true
    registry: "builtin"

  # Memory config
  memory:
    enabled: true
    type: "redis"  # redis, postgres, inmemory
    ttl: 3600

  # Vector store
  vectorStore:
    enabled: true
    type: "qdrant"  # qdrant, pgvector
    collection: "agents"

# External services
postgresql:
  enabled: true
  host: "postgres.ai-platform.svc.cluster.local"
  port: 5432
  database: "ai_agents"
  existingSecret: "postgres-credentials"
  secretKeys:
    username: "username"
    password: "password"

redis:
  enabled: true
  host: "redis.ai-platform.svc.cluster.local"
  port: 6379
  existingSecret: "redis-credentials"
  secretKeys:
    password: "password"

qdrant:
  enabled: true
  host: "qdrant.ai-platform.svc.cluster.local"
  port: 6333
  apiKey: ""
  existingSecret: "qdrant-credentials"

# Observability
observability:
  tracing:
    enabled: true
    sampler: 0.1
    exporter: "jaeger"
  logging:
    level: "info"
    format: "json"
  metrics:
    enabled: true
    path: "/metrics"
