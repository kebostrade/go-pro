apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-agent-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ai-platform

  source:
    repoURL: https://github.com/your-org/go-pro
    targetRevision: HEAD
    path: platform/charts/ai-agent
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: image.tag
          value: ${IMAGE_TAG}

  destination:
    server: https://kubernetes.default.svc
    namespace: ai-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
