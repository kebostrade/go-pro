apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-platform

resources:
  - ../../base

commonLabels:
  environment: production

images:
  - name: ai-agent-platform
    newTag: v1.0.0

configMapGenerator:
  - name: ai-agent-config
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - LOG_FORMAT=json

patchesStrategicMerge:
  - deployment-patch.yaml

# Production-specific resources
replicas:
  - name: ai-agent-platform
    count: 3
