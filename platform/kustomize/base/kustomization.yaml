apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-platform

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: ai-platform
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ai-agent-platform
    newName: ghcr.io/your-org/ai-agent-platform
    newTag: latest

configMapGenerator:
  - name: ai-agent-config
    literals:
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - AGENT_TYPE=react
      - LLM_PROVIDER=openai
      - LLM_MODEL=gpt-4

secretGenerator:
  - name: postgres-credentials
    type: Opaque
    literals:
      - username=ai_agent
      - password=CHANGE_ME
  - name: redis-credentials
    type: Opaque
    literals:
      - password=CHANGE_ME
  - name: llm-credentials
    type: Opaque
    literals:
      - api-key=CHANGE_ME
