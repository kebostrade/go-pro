apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  labels:
    app: k8s-go-sample
type: Opaque
data:
  # Base64 encoded values
  # echo -n 'admin-secret-key' | base64
  API_KEY: YWRtaW4tc2VjcmV0LWtleQ==

  # Database credentials
  # echo -n 'db_user' | base64
  DB_USER: ZGJfdXNlcg==
  # echo -n 'db_password' | base64
  DB_PASSWORD: ZGJfcGFzc3dvcmQ=

# To encode your own secrets:
# echo -n 'your-secret' | base64
