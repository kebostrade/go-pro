syntax = "proto3";

package user;

option go_package = "./proto";

// UserService demonstrates all gRPC patterns:
// - Unary RPC
// - Server streaming
// - Client streaming
// - Bidirectional streaming
service UserService {
  // Unary RPC: Get a single user by ID
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // Server streaming: Stream multiple users
  rpc ListUsers(ListUsersRequest) returns (stream User);

  // Client streaming: Create multiple users
  rpc CreateUsers(stream CreateUserRequest) returns (CreateUsersResponse);

  // Bidirectional streaming: Chat with multiple messages
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}

// User message
message User {
  string id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
  repeated string tags = 5;
}

// GetUser request and response
message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

// ListUsers request
message ListUsersRequest {
  int32 limit = 1;
  string filter = 2;  // Optional filter for tags
}

// CreateUser request
message CreateUserRequest {
  string name = 1;
  string email = 2;
  int32 age = 3;
  repeated string tags = 4;
}

// CreateUsers response
message CreateUsersResponse {
  repeated User users = 1;
  int32 count = 2;
  string message = 3;
}

// Chat message for bidirectional streaming
message ChatMessage {
  string user_id = 1;
  string message = 2;
  int64 timestamp = 3;
  MessageType type = 4;
}

enum MessageType {
  MESSAGE = 0;
  NOTIFICATION = 1;
  ERROR = 2;
}
