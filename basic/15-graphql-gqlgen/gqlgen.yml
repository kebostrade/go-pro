# gqlgen configuration file
# https://gqlgen.com/config/

# Refer to gqlgen.yml for detailed documentation

schema:
  - schema.graphqls

exec:
  filename: generated.go
  package: main

model:
  filename: models.go
  package: main

resolver:
  layout: follow-schema
  dir: .
  package: main
  filename_template: "{name}.go"
  # Where to write the resolver struct
  # Optional: default to "resolver.go"
  # type: Resolver

# Optional: Turn on use `gqlgen:"` tags everywhere
# omit_slice_element_pointers: true

# Optional: Turn off complexitity calculation
# omit_complexity: true

# Optional: Turn on strict input validation
# https://gqlgen.com/config/#strict-validation
strict_validation: true

# Optional: Reject nullable fields for non-nil input types
# omit_nullble_pointers: true

# autobinding: makes gqlgen bind to structs by name in the generated models
# This allows you to omit resolver methods for fields that can be bound directly
autobinding:
  - github.com/99designs/gqlgen/graphql/introspection

# Allow generating models for omitted types (like Query, Mutation)
# models:
#   User:
#     fields:
#       posts:
#         resolver: true

# Uncomment to use federation
# federation:
#   filename: graphql/federation.go
#   package: federation
