version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: microservices-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: microservices
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: microservices-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SERVICE_PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=microservices
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Product Service
  product-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.product-service
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      - SERVICE_PORT=8082
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Order Service
  order-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - SERVICE_PORT=8083
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVICE_PORT=8080
      - USER_SERVICE_URL=http://user-service:8081
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
    depends_on:
      - user-service
      - product-service
      - order-service
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: microservices-network

