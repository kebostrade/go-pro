version: '3.8'

services:
  gin-web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./internal/views:/app/internal/views:ro
      - ./static:/app/static:ro
