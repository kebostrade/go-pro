apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gopro-chart.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gopro-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "gopro-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gopro-chart.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "gopro-chart.fullname" . }}-config
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- with .Values.probes.liveness }}
        livenessProbe:
          httpGet:
            path: {{ $.Values.config.env.HEALTH_LIVE_PATH }}
            port: {{ $.Values.service.targetPort }}
            scheme: HTTP
          initialDelaySeconds: {{ .initialDelaySeconds }}
          periodSeconds: {{ .periodSeconds }}
          timeoutSeconds: {{ .timeoutSeconds }}
          failureThreshold: {{ .failureThreshold }}
        {{- end }}
        {{- with .Values.probes.readiness }}
        readinessProbe:
          httpGet:
            path: {{ $.Values.config.env.HEALTH_READY_PATH }}
            port: {{ $.Values.service.targetPort }}
            scheme: HTTP
          initialDelaySeconds: {{ .initialDelaySeconds }}
          periodSeconds: {{ .periodSeconds }}
          timeoutSeconds: {{ .timeoutSeconds }}
          failureThreshold: {{ .failureThreshold }}
        {{- end }}
        {{- with .Values.probes.startup }}
        startupProbe:
          httpGet:
            path: {{ $.Values.config.env.HEALTH_READY_PATH }}
            port: {{ $.Values.service.targetPort }}
            scheme: HTTP
          initialDelaySeconds: {{ .initialDelaySeconds }}
          periodSeconds: {{ .periodSeconds }}
          timeoutSeconds: {{ .timeoutSeconds }}
          failureThreshold: {{ .failureThreshold }}
        {{- end }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gopro-chart.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gopro-chart.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
