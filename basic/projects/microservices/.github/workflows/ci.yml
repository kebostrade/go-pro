name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Validate docker-compose
        run: docker-compose config --quiet

      - name: Build all services
        run: |
          go build -v ./cmd/service-a/...
          go build -v ./cmd/service-b/...
          go build -v ./cmd/gateway/...

      - name: Run tests
        run: go test -v -short ./...

      - name: Run linter
        run: golangci-lint run --timeout=5m ./... || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service-a
        run: docker build -t microservices-service-a -f Dockerfile.service-a .

      - name: Build service-b
        run: docker build -t microservices-service-b -f Dockerfile.service-b .

      - name: Build gateway
        run: docker build -t microservices-gateway -f Dockerfile.gateway .

  # Full integration test requires docker-compose
