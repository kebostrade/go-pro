# GraphQL schema location
schema:
  - ../schema/*.graphql

# Where should the generated server code go?
exec:
  filename: generated/generated.go
  package: generated

# Where should the generated models go?
model:
  filename: models/models_gen.go
  package: models

# Where should the resolver implementations go?
resolver:
  layout: follow-schema
  dir: resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

# Optional: where should the generated models for input types go?
autobind:
  - "github.com/DimaJoyti/go-pro/api-technologies-go/graphql/gqlgen/models"

# This section declares type mapping between GraphQL and Go types
models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Time:
    model:
      - time.Time

