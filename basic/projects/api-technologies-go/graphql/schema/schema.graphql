scalar Time

type User {
  id: ID!
  username: String!
  email: String!
  role: Role!
  active: Boolean!
  posts: [Post!]!
  createdAt: Time!
  updatedAt: Time!
}

type Post {
  id: ID!
  title: String!
  content: String!
  published: Boolean!
  author: User!
  authorId: ID!
  tags: [String!]!
  createdAt: Time!
  updatedAt: Time!
}

enum Role {
  ADMIN
  USER
  GUEST
}

input CreateUserInput {
  username: String!
  email: String!
  role: Role!
}

input UpdateUserInput {
  username: String
  email: String
  role: Role
  active: Boolean
}

input CreatePostInput {
  title: String!
  content: String!
  published: Boolean!
  authorId: ID!
  tags: [String!]
}

input UpdatePostInput {
  title: String
  content: String
  published: Boolean
  tags: [String!]
}

type Query {
  # User queries
  user(id: ID!): User
  users(role: Role, active: Boolean, limit: Int, offset: Int): [User!]!
  
  # Post queries
  post(id: ID!): Post
  posts(authorId: ID, published: Boolean, limit: Int, offset: Int): [Post!]!
  
  # Search
  searchUsers(query: String!): [User!]!
  searchPosts(query: String!): [Post!]!
}

type Mutation {
  # User mutations
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): Boolean!
  
  # Post mutations
  createPost(input: CreatePostInput!): Post!
  updatePost(id: ID!, input: UpdatePostInput!): Post!
  deletePost(id: ID!): Boolean!
  publishPost(id: ID!): Post!
  unpublishPost(id: ID!): Post!
}

type Subscription {
  userCreated: User!
  postCreated: Post!
  postPublished: Post!
}

